info:
  name: health
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/health"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.apiStatus
      operator: eq
      value: Healthy

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
