info:
  name: token other issuer
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/roles"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const tokenResponse = await bru.runRequest('_setup/mint token other issuer')
        bru.setVar('token', tokenResponse.data.token)
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
