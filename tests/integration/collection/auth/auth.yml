info:
  name: auth
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/roles"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
