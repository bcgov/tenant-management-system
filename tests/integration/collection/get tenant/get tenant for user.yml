info:
  name: get tenant for user
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/users/820D17EA8C90438A9A74925B442CE775/tenants"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        const tokenResponse = await bru.runRequest('_setup/mint token owner')
        bru.setVar('token', tokenResponse.data.token)
    - type: tests
      code: |-
        test('tenants to include tenant name', () => {
          const tenants = res.getBody().data.tenants
          const tenant = tenants.find(tenant => tenant.id === bru.getVar('tenantId'))

          expect(tenant.name).to.equal(bru.getVar('tenantName'))
        })
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.data.tenants
      operator: isArray

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
