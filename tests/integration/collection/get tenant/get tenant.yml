info:
  name: get tenant
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/tenants/{{tenantId}}"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        const tokenResponse = await bru.runRequest('_setup/mint token owner')
        bru.setVar('token', tokenResponse.data.token)
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.data.tenant.id
      operator: eq
      value: "{{tenantId}}"
    - expression: res.body.data.tenant.ministryName
      operator: eq
      value: Ministry of Citizens' Services
    - expression: res.body.data.tenant.name
      operator: eq
      value: "{{tenantName}}"
    - expression: res.body.data.tenant.users
      operator: isUndefined
    - expression: res.body.data.tenant.roles
      operator: isUndefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
