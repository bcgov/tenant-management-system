opencollection: 1.0.0

info:
  name: cstar-integration-tests
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  scripts:
    - type: before-request
      code: |-
        // Create a timestamp that can be used anywhere a unique value is
        // needed, such as the name of a Tenant.
        const moment = require('moment')
        bru.setVar("timestamp", moment().format('HHmmssSSS'))
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
    presets:
      request:
        type: http
        url: "{{baseUrl}}/"
