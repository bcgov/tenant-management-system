info:
  name: mint token other audience
  type: http
  seq: 6
  tags:
    - setup

http:
  method: POST
  url: "{{mockJwksUrl}}/mint"
  body:
    type: json
    data: |-
      {
        "claims": {
          "aud": "other-audience",
          "identity_provider": "idir",
          "idir_user_guid": "BAC649237F244F3C806D3063BB4CEBCF",
          "sub": "bac649237f244f3c806d3063bb4cebcf@azureidir"
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.body.claims.aud
      operator: eq
      value: other-audience
    - expression: res.body.claims.identity_provider
      operator: eq
      value: idir
    - expression: res.body.claims.idir_user_guid
      operator: eq
      value: BAC649237F244F3C806D3063BB4CEBCF
    - expression: res.body.claims.sub
      operator: eq
      value: bac649237f244f3c806d3063bb4cebcf@azureidir
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
