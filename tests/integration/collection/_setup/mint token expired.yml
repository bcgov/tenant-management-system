info:
  name: mint token expired
  type: http
  seq: 5
  tags:
    - setup

http:
  method: POST
  url: "{{mockJwksUrl}}/mint"
  body:
    type: json
    data: |-
      {
        "claims": {
          "aud": "{{audience}}",
          "identity_provider": "idir",
          "idir_user_guid": "645963C37CB84B0BA1566C4EE35E8371",
          "sub": "645963c37cb84b0ba1566c4ee35e8371@azureidir"
        },
        "validFor": "-1h"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.body.claims.aud
      operator: eq
      value: "{{audience}}"
    - expression: res.body.claims.identity_provider
      operator: eq
      value: idir
    - expression: res.body.claims.idir_user_guid
      operator: eq
      value: 645963C37CB84B0BA1566C4EE35E8371
    - expression: res.body.claims.sub
      operator: eq
      value: 645963c37cb84b0ba1566c4ee35e8371@azureidir
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
