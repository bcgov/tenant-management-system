info:
  name: mint token expired
  type: http
  seq: 2

http:
  method: POST
  url: "{{mockJwksUrl}}/mint"
  body:
    type: json
    data: |-
      {
        "claims": {
          "aud": "{{audience}}",
          "identity_provider": "idir",
          "idir_user_guid": "8BADF00DCAFEBABE4ACE8BEEDEADBEEF",
          "sub": "8badf00dcafebabe4ace8beedeadbeef@azureidir"
        },
        "validFor": "-1h"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.body.claims.aud
      operator: eq
      value: "{{audience}}"
    - expression: res.body.claims.identity_provider
      operator: eq
      value: idir
    - expression: res.body.claims.idir_user_guid
      operator: eq
      value: 8BADF00DCAFEBABE4ACE8BEEDEADBEEF
    - expression: res.body.claims.sub
      operator: eq
      value: 8badf00dcafebabe4ace8beedeadbeef@azureidir
    - expression: res.status
      operator: eq
      value: "200"
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.token
        method: jsonq
      variable:
        name: token-expired
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
