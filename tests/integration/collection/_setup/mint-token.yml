info:
  name: mint-token
  type: http
  seq: 1

http:
  method: POST
  url: "{{mockJwksUrl}}/mint"
  body:
    type: json
    data: |
      {
        "aud": "{{tmsAudience}}",
        "identity_provider": "idir",
        "idir_user_guid": "test-user",
        "sub": "test-user"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        if (req.getExecutionMode() === 'runner') {
          console.log('skipping')
          bru.runner.skipRequest()
        }
  assertions:
    - expression: res.body.claims.aud
      operator: eq
      value: "{{tmsAudience}}"
    - expression: res.body.claims.identity_provider
      operator: eq
      value: idir
    - expression: res.body.claims.idir_user_guid
      operator: eq
      value: test-user
    - expression: res.body.claims.sub
      operator: eq
      value: test-user
    - expression: res.status
      operator: eq
      value: "200"
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.token
        method: jsonq
      variable:
        name: token
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
