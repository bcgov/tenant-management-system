info:
  name: mint token
  type: http
  seq: 2
  tags:
    - setup

http:
  method: POST
  url: "{{mockJwksUrl}}/mint"
  body:
    type: json
    data: |
      {
        "claims": {
          "aud": "{{audience}}",
          "identity_provider": "idir",
          "idir_user_guid": "2363A17E91694DC1B8312794946417C3",
          "sub": "2363a17e91694dc1b8312794946417c3@azureidir"
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.body.claims.aud
      operator: eq
      value: "{{audience}}"
    - expression: res.body.claims.identity_provider
      operator: eq
      value: idir
    - expression: res.body.claims.idir_user_guid
      operator: eq
      value: 2363A17E91694DC1B8312794946417C3
    - expression: res.body.claims.sub
      operator: eq
      value: 2363a17e91694dc1b8312794946417c3@azureidir
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
