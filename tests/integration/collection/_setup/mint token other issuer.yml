info:
  name: mint token other issuer
  type: http
  seq: 7
  tags:
    - setup

http:
  method: POST
  url: "{{mockJwksUrl}}/mint"
  body:
    type: json
    data: |-
      {
        "claims": {
          "aud": "{{audience}}",
          "identity_provider": "idir",
          "idir_user_guid": "68BE450BAEC74D8492AF3E10DB3ADA64",
          "sub": "68be450baec74d8492af3e10db3ada64@azureidir"
        },
        "issuer": "other-issuer"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.body.claims.aud
      operator: eq
      value: "{{audience}}"
    - expression: res.body.claims.identity_provider
      operator: eq
      value: idir
    - expression: res.body.claims.idir_user_guid
      operator: eq
      value: 68BE450BAEC74D8492AF3E10DB3ADA64
    - expression: res.body.claims.sub
      operator: eq
      value: 68be450baec74d8492af3e10db3ada64@azureidir
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
