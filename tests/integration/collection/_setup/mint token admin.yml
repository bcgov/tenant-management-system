info:
  name: mint token admin
  type: http
  seq: 3
  tags:
    - setup

http:
  method: POST
  url: "{{mockJwksUrl}}/mint"
  body:
    type: json
    data: |
      {
        "claims": {
          "aud": "{{audience}}",
          "client_roles": [
            "TMS.OPERATIONS_ADMIN"
          ],
          "identity_provider": "idir",
          "idir_user_guid": "3C0DF8A59F8C42D0A103CE765B00452B",
          "sub": "3c0df8a59f8c42d0a103ce765b00452b@azureidir"
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.body.claims.aud
      operator: eq
      value: "{{audience}}"
    - expression: res.body.claims.identity_provider
      operator: eq
      value: idir
    - expression: res.body.claims.idir_user_guid
      operator: eq
      value: 3C0DF8A59F8C42D0A103CE765B00452B
    - expression: res.body.claims.sub
      operator: eq
      value: 3c0df8a59f8c42d0a103ce765b00452b@azureidir
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
