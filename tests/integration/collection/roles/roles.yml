info:
  name: roles
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/roles"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        const tokenResponse = await bru.runRequest('_setup/mint token')
        bru.setVar('token', tokenResponse.data.token)
    - type: tests
      code: |-
        test('roles to be TMS.SERVICE_USER, TMS.TENANT_OWNER, TMS.USER_ADMIN', () => {
          const roles = res.getBody().data.roles
          const roleNames = roles.map(role => role.name)

          expect(roleNames).to.include.members([
            'TMS.SERVICE_USER',
            'TMS.TENANT_OWNER',
            'TMS.USER_ADMIN'
          ])
        })
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.data.roles
      operator: length
      value: "3"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
