services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/bcgov/tenant-management-system/backend:${IMAGE_TAG}
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DATABASE: app
      ISSUER: http://localhost:3001
      JWKS_URI: http://localhost:3001/certs
      NODE_ENV: test
    ports:
      - '4144:4144'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:4144/v1/health || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
