services:
  api:
    depends_on:
      db:
        condition: service_healthy
      mock-jwks:
        condition: service_healthy
    environment:
      ALLOWED_ORIGINS: http://localhost:3000
      BCGOV_SSO_API_CLIENT_ID: test-client-id
      BCGOV_SSO_API_CLIENT_SECRET: test-client-secret
      BCGOV_SSO_API_URL: http://localhost/sso
      BCGOV_SSO_API_URL_BCEID: http://localhost/sso/bceid
      BCGOV_TOKEN_URL: http://localhost/token
      ISSUER: http://localhost:7002
      JWKS_URI: http://mock-jwks:7002/certs
      LOG_LEVEL: error
      NODE_ENV: test
      PORT: 7001
      POSTGRES_DATABASE: tmsdb
      POSTGRES_HOST: db
      POSTGRES_PASSWORD: testsecretpassword
      POSTGRES_PORT: 5432
      POSTGRES_USER: tms
      TMS_AUDIENCE: cstar
    healthcheck:
      interval: 5s
      retries: 5
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--spider',
          '--tries=1',
          'http://localhost:7001/v1/health',
        ]
      timeout: 5s
    image: ghcr.io/bcgov/tenant-management-system/backend:${IMAGE_TAG}
    ports:
      - '7001:7001'

  db:
    environment:
      POSTGRES_DB: tmsdb
      POSTGRES_PASSWORD: testsecretpassword
      POSTGRES_USER: tms
    healthcheck:
      interval: 5s
      retries: 5
      test: ['CMD-SHELL', 'pg_isready -U tms']
      timeout: 5s
    image: postgres:17.7
    ports:
      - '7003:5432'
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d

  mock-jwks:
    build:
      context: ./mock-jwks
    healthcheck:
      interval: 5s
      retries: 5
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--spider',
          '--tries=1',
          'http://localhost:7002/certs',
        ]
      timeout: 5s
    ports:
      - '7002:7002'
