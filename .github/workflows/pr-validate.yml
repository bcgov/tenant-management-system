name: PR Validate

on:
  pull_request:
    types: [edited, opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-edit-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    name: Validate PR
    permissions:
      pull-requests: write
    uses: bcgov/quickstart-openshift-helpers/.github/workflows/.pr-validate.yml@ca6579bdadf383a2513397081f963889b92823a4 # v1.1.0
    with:
      markdown_links: |
        - [Frontend](https://cstar-${{ github.event.number }}.apps.silver.devops.gov.bc.ca)
        - [Backend](https://cstar-${{ github.event.number }}.apps.silver.devops.gov.bc.ca/api/v1)
        - [OpenAPI](https://cstar-${{ github.event.number }}.apps.silver.devops.gov.bc.ca/api/v1/docs)

  results:
    name: Validate Results
    if: always()
    needs: [validate]
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Success!"
