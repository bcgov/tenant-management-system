---
name: Deploy Prod (Gold)
permissions: {}
on:
  workflow_dispatch:
    inputs:
      autoscaling:
        description: 'enable or disable autoscaling'
        required: false
        type: boolean
        default: true
      tag:
        description: 'Image tag set to deploy; e.g. PR number or prod'
        type: string
        default: 'latest'
      db_user:
        description: "database user; e.g. PR number or approxy"
        required: false
        type: string
        default: "appproxy"
      params:
        description: Extra parameters to pass to helm upgrade
        required: false
        type: string
  workflow_call:
    inputs:
      autoscaling:
        description: 'enable or disable autoscaling'
        required: false
        type: boolean
        default: true
      tag:
        description: 'Image tag set to deploy; e.g. PR number or prod'
        required: false
        type: string
        default: 'latest'
      db_user:
        description: "database user; e.g. PR number or appproxy"
        required: false
        type: string
        default: "appproxy"
      params:
        description: Extra parameters to pass to helm upgrade
        required: false
        type: string
jobs:
  deploy-gold-prod:
    name: Deploys Prod (Gold)
    uses: ./.github/workflows/.deployer.yml
    secrets: inherit
    with:
      release_name: cstar-${{ inputs.tag }}
      environment: gold-prod
      db_user: ${{ inputs.db_user }} # appproxy is the user which works with pgbouncer.
      db_triggers: ('charts/crunchy/')
      params: 
        --set global.autoscaling=${{ inputs.autoscaling }}
        --set frontend.autoscaling.enabled=${{ inputs.autoscaling }}
        --set frontend.autoscaling.minReplicas=2
        --set frontend.autoscaling.maxReplicas=3
        --set frontend.deploymentStrategy=RollingUpdate
        --set frontend.pdb.enabled=true
        --set frontend.pdb.minAvailable=1
        --set backend.autoscaling.enabled=${{ inputs.autoscaling }}
        --set backend.autoscaling.minReplicas=2
        --set backend.autoscaling.maxReplicas=3
        --set backend.deploymentStrategy=RollingUpdate
        --set backend.pdb.enabled=true
        --set backend.pdb.minAvailable=1
        --set global.domain="apps.gold.devops.gov.bc.ca"
        ${{ inputs.params }}
      tag: ${{ inputs.tag }}

  deploy-golddr-prod:
    name: Deploys Prod (Golddr)
    uses: ./.github/workflows/.deployer.yml
    secrets: inherit
    with:
      release_name: cstar-${{ inputs.tag }}
      environment: golddr-prod
      db_user: ${{ inputs.db_user }} # appproxy is the user which works with pgbouncer.
      db_triggers: ('charts/crunchy/')
      params: 
        --set global.autoscaling=${{ inputs.autoscaling }}
        --set frontend.autoscaling.enabled=${{ inputs.autoscaling }}
        --set frontend.autoscaling.minReplicas=2
        --set frontend.autoscaling.maxReplicas=3
        --set frontend.deploymentStrategy=RollingUpdate
        --set frontend.pdb.enabled=true
        --set frontend.pdb.minAvailable=1
        --set backend.autoscaling.enabled=${{ inputs.autoscaling }}
        --set backend.autoscaling.minReplicas=2
        --set backend.autoscaling.maxReplicas=3
        --set backend.deploymentStrategy=RollingUpdate
        --set backend.pdb.enabled=true
        --set backend.pdb.minAvailable=1
        --set global.domain="apps.golddr.devops.gov.bc.ca"
        ${{ inputs.params }}
      tag: ${{ inputs.tag }}
